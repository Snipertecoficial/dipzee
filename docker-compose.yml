services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      # Root credentials are ONLY for cluster administration (backups,
      # creating the scoped user below) — the backend never connects with
      # these, so a compromised backend can't touch other databases, create
      # users, or change auth config.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_DB: ${DB_NAME}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks: [dipzee]

  backend:
    build: ./backend
    restart: unless-stopped
    # List form (not the `env_file: .env` scalar shorthand): it's the
    # canonical Compose spec form and, unlike the scalar, is accepted by the
    # Hostinger panel's stricter YAML validator. Keep this in the list form so
    # a `git reset --hard` on deploy never reintroduces the rejected scalar.
    env_file:
      - .env
    environment:
      # Scoped to readWrite on DB_NAME only (see mongo-init/init-app-user.js)
      # — deliberately NOT the root user. env_file values don't get
      # variable-expanded, so this must be set here.
      MONGO_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/${DB_NAME}?authSource=${DB_NAME}
    depends_on: [mongo]
    networks: [dipzee]

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    restart: unless-stopped
    depends_on: [backend]
    networks: [dipzee]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # No published ports here on purpose: this VPS already runs a Traefik
    # instance (shared with other projects on the same host — DO NOT touch
    # its own stack/config) that owns 80/443. Traefik reverse-proxies to us
    # by the labels below instead of Caddy binding the host ports itself.
    # Caddy keeps doing what it already did well — the /api/* vs frontend
    # path split (see Caddyfile) — just as a plain-HTTP service behind
    # Traefik now, since Traefik is the one terminating TLS at the edge.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.dipzee.rule=Host(`${DOMAIN}`)"
      # Confirmed against the real Traefik instance on the VPS (matches what
      # the existing Areis services there already use).
      - "traefik.http.routers.dipzee.entrypoints=websecure"
      - "traefik.http.routers.dipzee.tls.certresolver=letsencrypt"
      - "traefik.http.services.dipzee.loadbalancer.server.port=80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, frontend]
    networks: [dipzee, traefik]

networks:
  dipzee:
  # The Traefik instance already running on this VPS (shared with other
  # projects — DO NOT touch its own stack) is attached to this network;
  # confirmed against its live config, not a placeholder.
  traefik:
    external: true

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
